name: Monitoring Go Tests

on:
  push:
    branches:
      - main
      - master
    paths:
      - Microservice_Monitoring/**
      - .github/workflows/monitoring-go-tests.yml
  pull_request:
    paths:
      - Microservice_Monitoring/**
      - .github/workflows/monitoring-go-tests.yml
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: Microservice_Monitoring

jobs:
  unit-and-interface-tests:
    name: Unit and Interface Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: Microservice_Monitoring/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run unit and interface tests
        run: go test ./internal/... -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-and-interface-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: Microservice_Monitoring/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Start stack for integration tests
        run: docker compose up -d --build monitoring-service

      - name: Wait for API readiness
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/api/v1/status > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done
          echo "API did not become ready in time"
          docker compose ps
          docker compose logs --no-color --tail=200 monitoring-service migrate timescaledb nats
          exit 1

      - name: Run integration tests
        run: go test -tags=integration ./tests/integration -v

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300 monitoring-service migrate timescaledb nats

      - name: Stop stack
        if: always()
        run: docker compose down -v
