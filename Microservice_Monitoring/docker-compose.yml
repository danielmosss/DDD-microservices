services:
  # 1. Jouw Database
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_USER=monitoring_database_user
      - POSTGRES_PASSWORD=pas5w0rd!MonitoringDDD
      - POSTGRES_DB=monitoring
    ports:
      - "5432:5432" # Opengezet zodat jouw lokale Go-code erbij kan
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d monitoring"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. De Automatische Migrator
  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://monitoring_database_user:pas5w0rd!MonitoringDDD@timescaledb:5432/monitoring?sslmode=disable
      - up
    depends_on:
      timescaledb:
        condition: service_healthy

  # 3. De Messagebus
  nats:
    image: nats:latest
    command: "-js" # Activeert JetStream
    ports:
      - "4222:4222" # Voor je Go code
      - "8222:8222" # Dashboard voor in je browser

  dashboard:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm start -- --host 0.0.0.0 --poll 2000"
    ports:
      - "4200:4200"
    volumes:
      - ./Angular/dashboard:/app
      - dashboard_node_modules:/app/node_modules
    depends_on:
      - nats

  monitoring-data-generator:
    build:
      context: ./MonitoringDataGenerator
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://monitoring_database_user:pas5w0rd!MonitoringDDD@timescaledb:5432/monitoring?sslmode=disable
      - NATS_URL=nats://nats:4222
    depends_on:
      timescaledb:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started

  monitoring-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://monitoring_database_user:pas5w0rd!MonitoringDDD@timescaledb:5432/monitoring?sslmode=disable
      - NATS_URL=nats://nats:4222
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
      monitoring-data-generator:
        condition: service_started

volumes:
  timescaledb_data:
  dashboard_node_modules: