definitions:
  frontend.BulkSensorDataRequest:
    properties:
      sensorIds:
        items:
          type: integer
        type: array
    type: object
  models.Afwijking:
    properties:
      gemeten_waarde:
        type: number
      id:
        type: integer
      is_warning:
        type: boolean
      kunstwerkId:
        type: integer
      metingId:
        type: integer
      norm_marge_percentage:
        type: number
      norm_max_waarde:
        type: number
      norm_min_waarde:
        type: number
      sensorId:
        type: integer
      time:
        type: string
    type: object
  models.DailyHealthSummary:
    properties:
      aantalActieveSensoren:
        type: integer
      aantalAfwijkendeSensoren:
        type: integer
      aantalAfwijkingen:
        type: integer
      aantalSensoren:
        type: integer
      kunstwerkBeheerIdentifier:
        type: string
      kunstwerkDetail:
        $ref: '#/definitions/models.KunstwerkDetail'
      kunstwerkId:
        type: integer
      status:
        $ref: '#/definitions/models.Status'
      tijd:
        type: string
    type: object
  models.IncMeting:
    properties:
      kunstwerkId:
        type: integer
      sensorId:
        type: integer
      waarde:
        type: number
    type: object
  models.Kunstwerk:
    properties:
      beheerIdentifier:
        type: string
      beschrijving:
        type: string
      deleted:
        type: boolean
      geolocation:
        type: string
      id:
        type: integer
      kunstwerkTypeId:
        type: integer
      lastsenddhupdate:
        type: string
      naam:
        type: string
    type: object
  models.KunstwerkDetail:
    properties:
      kunstwerk:
        $ref: '#/definitions/models.Kunstwerk'
      kunstwerkType:
        $ref: '#/definitions/models.KunstwerkType'
    type: object
  models.KunstwerkTreeResponse:
    properties:
      kunstwerkdetail:
        $ref: '#/definitions/models.KunstwerkDetail'
      losseSensoren:
        items:
          type: integer
        type: array
      onderdelen:
        items:
          $ref: '#/definitions/models.TreeOnderdeel'
        type: array
    type: object
  models.KunstwerkType:
    properties:
      beschrijving:
        type: string
      id:
        type: integer
      naam:
        type: string
    type: object
  models.Meting:
    properties:
      id:
        type: integer
      inspectieId:
        type: string
      isHandmatig:
        type: boolean
      kunstwerkId:
        type: integer
      sensorId:
        type: integer
      time:
        type: string
      waarde:
        type: number
    type: object
  models.Sensor:
    properties:
      geolocation:
        type: string
      id:
        type: integer
      kunstwerkId:
        type: integer
      last_analyzed_meting_id:
        type: integer
      onderdeelId:
        type: integer
      sensorConfiguratie:
        $ref: '#/definitions/models.SensorConfiguratie'
      sensortype_id:
        type: integer
    type: object
  models.SensorConfiguratie:
    properties:
      id:
        type: integer
      marge_percentage:
        type: number
      max_value:
        type: number
      min_value:
        type: number
      sensor_id:
        type: integer
    type: object
  models.SensorDetailResponse:
    properties:
      afwijking:
        $ref: '#/definitions/models.Afwijking'
      id:
        type: integer
      laatsteMeting:
        $ref: '#/definitions/models.Meting'
      sensorConfiguratie:
        $ref: '#/definitions/models.SensorConfiguratie'
      sensorType:
        $ref: '#/definitions/models.SensorType'
      status:
        $ref: '#/definitions/models.Status'
    type: object
  models.SensorType:
    properties:
      drempel_is_range:
        type: boolean
      eenheid:
        type: string
      id:
        type: integer
      naam:
        type: string
    type: object
  models.Status:
    enum:
    - healthy
    - warning
    - critical
    - offline
    type: string
    x-enum-varnames:
    - StatusHealthy
    - StatusWarning
    - StatusCritical
    - StatusOffline
  models.TreeOnderdeel:
    properties:
      id:
        type: integer
      naam:
        type: string
      onderdelen:
        items:
          $ref: '#/definitions/models.TreeOnderdeel'
        type: array
      parent_id:
        type: integer
      sensoren:
        items:
          type: integer
        type: array
    type: object
  v1.PaginatedResponse-models_Afwijking:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Afwijking'
        type: array
      pagination:
        $ref: '#/definitions/v1.PaginationMeta'
    type: object
  v1.PaginatedResponse-models_Meting:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Meting'
        type: array
      pagination:
        $ref: '#/definitions/v1.PaginationMeta'
    type: object
  v1.PaginationMeta:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
info:
  contact: {}
paths:
  /api/frontend/kunstwerken/{kunstwerkId}/sensoren/bulk-actueel:
    post:
      consumes:
      - application/json
      parameters:
      - description: Kunstwerk ID
        in: path
        name: kunstwerkId
        required: true
        type: integer
      - description: JSON body met een array van sensor IDs
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/frontend.BulkSensorDataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SensorDetailResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Returns for each sensor that is given the latest meting (and afwijking
        if it is) and the sensor configuration.
      tags:
      - Frontend
  /api/frontend/kunstwerken/{kunstwerkId}/tree:
    get:
      consumes:
      - application/json
      description: Tree of the kunstwerk
      parameters:
      - description: Kunstwerk ID
        in: path
        name: kunstwerkId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.KunstwerkTreeResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Returns a hierarchical tree of the kunstwerk, its onderdelen, and their
        sensoren
      tags:
      - Frontend
  /api/v1/afwijkingen/{kunstwerkId}:
    get:
      consumes:
      - application/json
      description: Returns all afwijkingen for the specified kunstwerk
      parameters:
      - description: Kunstwerk ID
        in: path
        name: kunstwerkId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.PaginatedResponse-models_Afwijking'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all afwijkingen for a kunstwerk
      tags:
      - Afwijkingen
  /api/v1/kunstwerken:
    get:
      consumes:
      - application/json
      description: Returns a list of active kunstwerken
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Kunstwerk'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List active kunstwerken
      tags:
      - Kunstwerken
  /api/v1/kunstwerken/{kunstwerkId}/dailyhealthupdate:
    get:
      consumes:
      - application/json
      description: Returns daily health update for the specified kunstwerk, including
        aggregated sensor data and health status
      parameters:
      - description: Kunstwerk ID
        in: path
        name: kunstwerkId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.DailyHealthSummary'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get daily health update for a kunstwerk
      tags:
      - Kunstwerken
  /api/v1/kunstwerken/{kunstwerkId}/sensoren:
    get:
      consumes:
      - application/json
      description: Returns sensors for the specified kunstwerk
      parameters:
      - description: Kunstwerk ID
        in: path
        name: kunstwerkId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Sensor'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List sensoren for a kunstwerk
      tags:
      - Sensoren
  /api/v1/meting:
    post:
      consumes:
      - application/json
      description: Create a manual meting for a sensor. SensorId is required.
      parameters:
      - description: IncMeting
        in: body
        name: meting
        required: true
        schema:
          $ref: '#/definitions/models.IncMeting'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Meting'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a manual meting (inspecteur)
      tags:
      - Metingen
  /api/v1/metingen/{kunstwerkId}:
    get:
      consumes:
      - application/json
      description: Return all metingen for given kunstwerkid
      parameters:
      - description: Kunstwerk ID
        in: path
        name: kunstwerkId
        required: true
        type: integer
      - description: Limit number of results
        in: query
        name: limit
        type: integer
      - description: Offset of number of results
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.PaginatedResponse-models_Meting'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: All metingen for one kunstwerk
      tags:
      - Metingen
  /api/v1/metingen/{kunstwerkId}/recent:
    get:
      consumes:
      - application/json
      description: Returns the most recent meting per sensor for the specified kunstwerk
      parameters:
      - description: Kunstwerk ID
        in: path
        name: kunstwerkId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Meting'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get most recent measurement per sensor for a kunstwerk
      tags:
      - Metingen
  /api/v1/status:
    get:
      consumes:
      - application/json
      description: Get the status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Status
      tags:
      - Status
swagger: "2.0"
